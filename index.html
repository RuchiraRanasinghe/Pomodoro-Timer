<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debate Timer – Peradeniya University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-frame">

    <!-- HEADER BANNER IMAGE -->
    <header class="header-wrap">
      <img src="Timer_BG_FREE.png" alt="Peradeniya University – Debate 2026" class="header-img" />
    </header>

    <!-- TIMER DISPLAY -->
    <div class="timer-section">
      <div id="timer" class="timer-digits">00:00</div>
    </div>

    <!-- BOTTOM CONTROL GRID -->
    <div class="control-grid">

      <button class="grid-btn preset-btn" data-seconds="240" id="btn4">4 min</button>
      <button class="grid-btn preset-btn" data-seconds="300" id="btn5">5 min</button>

      <button class="grid-btn start-btn" id="start">Start</button>

      <!-- Reset -->
      <button class="grid-btn icon-btn" id="reset" title="Reset">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>

      <!-- Manual Bell trigger (was speaker/mute) -->
      <button class="grid-btn icon-btn" id="bell-btn" title="Ring Bell">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
      </button>

      <!-- Fullscreen -->
      <button class="grid-btn icon-btn" id="fullscreen" title="Fullscreen">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>

    </div>

    <!-- progress bar -->
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>

  </div>

  <!-- Bell audio — place bell.wav in the same folder -->
  <audio id="bell-audio" preload="auto">
    <source src="bell2.wav" type="audio/wav" />
  </audio>

  <script src="app.js"></script>
</body>
</html>
